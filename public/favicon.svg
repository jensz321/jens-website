<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" fill="#1a1a1a" rx="56"/>

  <!-- Decorative circle accent -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="#d97706" stroke-width="3" opacity="0.3"/>

  <!-- Letter J -->
  <g transform="translate(128, 128)">
    <!-- Main vertical stroke of J -->
    <path d="M -15 -50 L -15 20 Q -15 45 -5 55 L 15 55"
          stroke="#d97706"
          stroke-width="20"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <!-- Small accent dot -->
    <circle cx="0" cy="-65" r="6" fill="#d97706" opacity="0.6"/>
  </g>
</svg>
